services:
  - type: web
    name: projectportal-api
    runtime: node
    plan: starter
    buildCommand: npm install && npm test && npm run db:migrate && npm run db:seed
    startCommand: node index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MAX_FILE_SIZE
        value: "10485760"
      - key: CLIENT_URL
        sync: false # Set to your ProjectPortalWeb URL, e.g. https://projectportal-web.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: projectportal-db
          property: connectionString
      - key: DATABASE_SSLMODE
        value: no-verify
      - key: SEED_PASSWORD
        sync: false # Demo login password for the seeded one-user-per-role accounts
      - key: RESEND_API_KEY
        sync: false # Resend API key for step-handoff email notifications (optional)
      - key: EMAIL_FROM
        sync: false # Sender, e.g. "Franmarine Project Portal <notifications@yourdomain>"

databases:
  - name: projectportal-db
    plan: starter
    databaseName: projectportal
    postgresMajorVersion: "16"
